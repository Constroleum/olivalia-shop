<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLIVALIA — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #B8986A; --black: #0A0A0A; --dark: #111; --white: #F5F0E8; --text: #C8BFB0; }
    body { background: var(--black); color: var(--white); font-family: 'Montserrat', sans-serif; min-height: 100vh; }

    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: var(--dark); border: 1px solid rgba(184,152,106,0.25); padding: 48px; width: 360px; text-align: center; }
    .login-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 5px; margin-bottom: 32px; color: var(--gold); }
    .login-box input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(184,152,106,0.2); color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 13px; outline: none; margin-bottom: 16px; }
    .login-box button { width: 100%; padding: 14px; background: var(--gold); border: none; color: var(--black); font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; }
    .login-box button:hover { background: #D4B483; }
    .login-error { color: #CF6679; font-size: 11px; margin-top: 12px; }

    header { background: var(--dark); border-bottom: 1px solid rgba(184,152,106,0.2); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo a { text-decoration: none; display: flex; align-items: center; }
    .header-logo img { width: 160px; height: auto; min-width: 130px; mix-blend-mode: screen; }
    .header-actions { display: flex; gap: 12px; }
    .btn { padding: 8px 20px; background: none; border: 1px solid rgba(184,152,106,0.4); color: var(--gold); font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; }
    .btn:hover { background: rgba(184,152,106,0.1); border-color: var(--gold); }
    .btn-primary { background: var(--gold); color: var(--black); border-color: var(--gold); }
    .btn-primary:hover { background: #D4B483; }

    main { padding: 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--dark); border: 1px solid rgba(184,152,106,0.12); padding: 24px; }
    .stat-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--white); }
    .stat-sub { font-size: 10px; color: var(--text); margin-top: 4px; }

    .section-title { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid rgba(184,152,106,0.15); }
    .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tag { padding: 6px 16px; border: 1px solid rgba(184,152,106,0.2); background: none; color: var(--text); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .filter-tag.active { border-color: var(--gold); color: var(--gold); background: rgba(184,152,106,0.06); }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 400; background: rgba(184,152,106,0.04); border-bottom: 1px solid rgba(184,152,106,0.15); }
    td { padding: 14px 16px; font-size: 12px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:hover td { background: rgba(184,152,106,0.03); }
    .order-id { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--white); letter-spacing: 1px; }
    .status-badge { display: inline-block; padding: 3px 10px; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid; }
    .status-pending { color: #F0B429; border-color: rgba(240,180,41,0.4); background: rgba(240,180,41,0.08); }
    .status-paid { color: #4CAF50; border-color: rgba(76,175,80,0.4); background: rgba(76,175,80,0.08); }
    .status-shipped { color: #B8986A; border-color: rgba(184,152,106,0.4); background: rgba(184,152,106,0.08); }
    .status-delivered { color: #81C784; border-color: rgba(129,199,132,0.4); background: rgba(129,199,132,0.08); }
    .status-cancelled { color: #CF6679; border-color: rgba(207,102,121,0.4); background: rgba(207,102,121,0.08); }

    select.status-select { background: rgba(255,255,255,0.03); border: 1px solid rgba(184,152,106,0.2); color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 10px; padding: 4px 8px; cursor: pointer; outline: none; }
    select.status-select option { background: var(--dark); }

    .expand-btn { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 16px; padding: 0; }
    .order-detail { display: none; background: rgba(0,0,0,0.3); }
    .order-detail.open { display: table-row; }
    .order-detail td { padding: 16px 24px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .detail-section h4 { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .detail-section p { font-size: 12px; color: var(--text); line-height: 1.8; }
    .detail-items { margin-top: 16px; }
    .detail-item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; color: var(--text); }

    .empty-state { text-align: center; padding: 60px; color: var(--text); font-size: 11px; letter-spacing: 2px; }
    .loading { text-align: center; padding: 40px; color: var(--text); }
    
    .tab-nav { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid rgba(184,152,106,0.2); }
    .tab-btn { padding: 10px 24px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-bottom: -1px; }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover { color: var(--gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .stock-table { width: 100%; border-collapse: collapse; }
    .stock-table th { text-align: left; padding: 10px 16px; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 400; background: rgba(184,152,106,0.04); border-bottom: 1px solid rgba(184,152,106,0.15); }
    .stock-table td { padding: 10px 16px; font-size: 12px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .stock-table tr:hover td { background: rgba(184,152,106,0.03); }
    .stock-input { width: 70px; background: rgba(255,255,255,0.05); border: 1px solid rgba(184,152,106,0.3); color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 12px; padding: 4px 8px; text-align: center; outline: none; }
    .stock-input:focus { border-color: var(--gold); }
    .stock-save-btn { padding: 5px 12px; background: none; border: 1px solid rgba(184,152,106,0.4); color: var(--gold); font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .stock-save-btn:hover { background: rgba(184,152,106,0.1); border-color: var(--gold); }
    .stock-badge-low { color: #F0B429; font-weight: 500; }
    .stock-badge-ok { color: #4CAF50; }
    .stock-badge-zero { color: #CF6679; font-weight: 700; }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } main { padding: 16px; } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">OLIVALIA<br><span style="font-size:11px;letter-spacing:4px;color:var(--text)">ADMIN</span></div>
    <input type="password" id="adminKey" placeholder="Admin jelszó" onkeypress="if(event.key==='Enter') login()">
    <button onclick="login()">Belépés</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD//Z" alt="OLIVALIA" style="width:160px;height:auto;mix-blend-mode:screen;"></a><span style="font-size:9px;letter-spacing:4px;color:var(--text);font-weight:200;">ADMIN</span></div>
    <div class="header-actions">
      <a class="btn" id="csvBtn" onclick="exportCSV()">📥 CSV Export (Access)</a>
      <button class="btn" onclick="loadOrders()">🔄 Frissítés</button>
      <button class="btn" onclick="logout()">Kilépés</button>
    </div>
  </header>

  <main>
    <div class="stats-grid" id="statsGrid"></div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="showTab('orders', this)">Rendelések</button>
      <button class="tab-btn" onclick="showTab('stock', this)">Készlet</button>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-panel active" id="tab-orders">
      <div class="filters">
        <button class="filter-tag active" onclick="filterOrders('all', this)">Összes</button>
        <button class="filter-tag" onclick="filterOrders('pending', this)">Függőben</button>
        <button class="filter-tag" onclick="filterOrders('paid', this)">Fizetve</button>
        <button class="filter-tag" onclick="filterOrders('shipped', this)">Elküldve</button>
        <button class="filter-tag" onclick="filterOrders('delivered', this)">Kézbesítve</button>
        <button class="filter-tag" onclick="filterOrders('cancelled', this)">Lemondva</button>
      </div>
      <div id="ordersContainer"><div class="loading">Betöltés...</div></div>
    </div>

    <!-- STOCK TAB -->
    <div class="tab-panel" id="tab-stock">
      <div id="stockContainer"><div class="loading">Betöltés...</div></div>
    </div>
  </main>
</div>

<script>
let adminKey = '';
let allOrders = [];
let currentFilter = 'all';

const API = 'https://olivalia-shop.onrender.com';

async function login() {
  const key = document.getElementById('adminKey').value;
  if (!key) return;
  try {
    const res = await fetch(`${API}/admin/orders`, { headers: { 'x-admin-key': key } });
    if (!res.ok) { document.getElementById('loginError').textContent = 'Érvénytelen jelszó'; return; }
    adminKey = key;
    sessionStorage.setItem('olivalia_admin', key);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    allOrders = await res.json();
    renderStats();
    renderOrders();
  } catch { document.getElementById('loginError').textContent = 'Kapcsolódási hiba'; }
}

function logout() {
  sessionStorage.removeItem('olivalia_admin');
  adminKey = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

async function loadOrders() {
  const res = await fetch(`${API}/admin/orders`, { headers: { 'x-admin-key': adminKey } });
  allOrders = await res.json();
  renderStats();
  renderOrders();
}

function renderStats() {
  const paid = allOrders.filter(o => o.status === 'paid' || o.status === 'shipped' || o.status === 'delivered');
  const totalRevHUF = paid.reduce((s, o) => s + (o.totalHUF || 0), 0);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Összes rendelés</div><div class="stat-value">${allOrders.length}</div></div>
    <div class="stat-card"><div class="stat-label">Fizetve</div><div class="stat-value">${paid.length}</div></div>
    <div class="stat-card"><div class="stat-label">Bevétel (Ft)</div><div class="stat-value">${totalRevHUF.toLocaleString('hu-HU')}</div><div class="stat-sub">≈ €${(totalRevHUF/385).toFixed(0)}</div></div>
    <div class="stat-card"><div class="stat-label">Függőben</div><div class="stat-value">${allOrders.filter(o=>o.status==='pending').length}</div></div>
  `;
}

function filterOrders(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  let orders = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
  orders = [...orders].reverse();
  if (orders.length === 0) {
    document.getElementById('ordersContainer').innerHTML = '<div class="empty-state">Nincs rendelés</div>';
    return;
  }
  document.getElementById('ordersContainer').innerHTML = `
    <table>
      <thead><tr>
        <th></th>
        <th>Rendelésszám</th>
        <th>Dátum</th>
        <th>Vásárló</th>
        <th>Ország</th>
        <th>Termékek</th>
        <th>Összeg</th>
        <th>Státusz</th>
        <th>Művelet</th>
      </tr></thead>
      <tbody id="ordersBody">
        ${orders.map(order => `
          <tr>
            <td><button class="expand-btn" onclick="toggleDetail('detail-${order.orderId}')">▶</button></td>
            <td><span class="order-id">${order.orderId}</span></td>
            <td>${new Date(order.createdAt).toLocaleDateString('hu-HU')}</td>
            <td>${order.customer.firstName} ${order.customer.lastName}<br><small style="color:#666;">${order.customer.email}</small></td>
            <td>${order.customer.country}</td>
            <td>${order.items.length} tétel</td>
            <td style="color:var(--gold);">${order.totalDisplay}</td>
            <td><span class="status-badge status-${order.status}">${statusLabel(order.status)}</span></td>
            <td>
              <select class="status-select" onchange="updateStatus('${order.orderId}', this.value)">
                <option value="pending" ${order.status==='pending'?'selected':''}>Függőben</option>
                <option value="paid" ${order.status==='paid'?'selected':''}>Fizetve</option>
                <option value="shipped" ${order.status==='shipped'?'selected':''}>Elküldve</option>
                <option value="delivered" ${order.status==='delivered'?'selected':''}>Kézbesítve</option>
                <option value="cancelled" ${order.status==='cancelled'?'selected':''}>Lemondva</option>
              </select>
            </td>
          </tr>
          <tr class="order-detail" id="detail-${order.orderId}">
            <td colspan="9">
              <div class="detail-grid">
                <div class="detail-section">
                  <h4>Szállítási adatok</h4>
                  <p>${order.customer.firstName} ${order.customer.lastName}<br>
                  ${order.customer.address}<br>
                  ${order.customer.zip} ${order.customer.city}<br>
                  ${order.customer.country}<br>
                  📧 ${order.customer.email}<br>
                  ${order.customer.phone ? '📱 ' + order.customer.phone : ''}</p>
                </div>
                <div class="detail-section">
                  <h4>Fizetés</h4>
                  <p>ID: <code style="font-size:11px;color:var(--gold);">${order.paymentIntentId}</code><br>
                  Deviza: ${order.currency}<br>
                  Szállítás: ${order.shippingDisplay}<br>
                  Végösszeg: ${order.totalDisplay}</p>
                </div>
              </div>
              <div class="detail-items">
                <h4 style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;">Termékek</h4>
                ${order.items.map(i => `
                  <div class="detail-item-row">
                    <span>${i.name} (${i.format}) × ${i.qty}</span>
                    <span>${i.price ? i.price.toLocaleString('hu-HU') + ' Ft' : '€' + (i.priceEUR || '')}</span>
                  </div>`).join('')}
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function statusLabel(s) {
  const labels = { pending: 'Függőben', paid: 'Fizetve', shipped: 'Elküldve', delivered: 'Kézbesítve', cancelled: 'Lemondva' };
  return labels[s] || s;
}

function toggleDetail(id) {
  const row = document.getElementById(id);
  row.classList.toggle('open');
}

async function updateStatus(orderId, newStatus) {
  await fetch(`${API}/admin/orders/${orderId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
    body: JSON.stringify({ status: newStatus })
  });
  await loadOrders();
}

async function exportCSV() {
  window.open(`https://olivalia-shop.onrender.com/admin/export-csv?key=${adminKey}`, '_blank');
}

// ── TAB NAVIGATION ────────────────────────────────────────────────────────────
function showTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'stock') loadStock();
}

// ── STOCK MANAGEMENT ─────────────────────────────────────────────────────────
let allProducts = [];

async function loadStock() {
  try {
    const res = await fetch(`${API}/api/products`);
    allProducts = await res.json();
    renderStock();
  } catch(e) {
    document.getElementById('stockContainer').innerHTML = '<div class="empty-state">Nem sikerült betölteni a készletet.</div>';
  }
}

function stockBadge(stock) {
  if (stock === 0) return `<span class="stock-badge-zero">● ELFOGYOTT</span>`;
  if (stock <= 3) return `<span class="stock-badge-low">● Kevés (${stock})</span>`;
  return `<span class="stock-badge-ok">● ${stock} db</span>`;
}

function discountDisplay(discount) {
  if (!discount) return '<span style="color:#555;">—</span>';
  const label = discount.type === 'percent' ? `-${discount.value}%` : `-${discount.value.toLocaleString('hu-HU')} Ft`;
  return `<span style="color:#CF6679;font-weight:600;">${label}</span>`;
}

function calcDiscounted(price, discount) {
  if (!discount) return null;
  if (discount.type === 'percent') return Math.round(price * (1 - discount.value / 100));
  if (discount.type === 'fixed')   return Math.max(0, price - discount.value);
  return null;
}

function renderStock() {
  if (!allProducts.length) {
    document.getElementById('stockContainer').innerHTML = '<div class="empty-state">Nincsenek termékek.</div>';
    return;
  }
  document.getElementById('stockContainer').innerHTML = `
    <table class="stock-table">
      <thead><tr>
        <th>#</th>
        <th>Márka</th>
        <th>Termék</th>
        <th>Kiszerelés</th>
        <th>Ár (Ft)</th>
        <th>Kedvezmény</th>
        <th>Akciós ár</th>
        <th>Készlet</th>
        <th>Műveletek</th>
      </tr></thead>
      <tbody>
        ${allProducts.map(p => {
          const discPrice = calcDiscounted(p.price, p.discount);
          return `
          <tr id="stock-row-${p.id}">
            <td style="color:#555;">${p.id}</td>
            <td>${p.brand}</td>
            <td style="color:var(--white);">${p.name_hu}</td>
            <td>${p.format}</td>
            <td style="color:var(--gold);">${p.price.toLocaleString('hu-HU')} Ft</td>
            <td id="disc-cell-${p.id}">${discountDisplay(p.discount)}</td>
            <td id="disc-price-cell-${p.id}" style="color:#CF6679;">
              ${discPrice !== null ? discPrice.toLocaleString('hu-HU') + ' Ft' : '—'}
            </td>
            <td id="stock-cell-${p.id}">${stockBadge(p.stock)}</td>
            <td style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
              <input class="stock-input" type="number" min="0" id="stock-val-${p.id}" value="${p.stock}" style="width:60px;">
              <button class="stock-save-btn" onclick="saveStock(${p.id})">Készlet</button>
              <select class="stock-input" id="disc-type-${p.id}" style="width:80px;padding:4px 4px;">
                <option value="percent" ${p.discount && p.discount.type==='percent' ? 'selected' : ''}>%</option>
                <option value="fixed"   ${p.discount && p.discount.type==='fixed'   ? 'selected' : ''}>Ft</option>
              </select>
              <input class="stock-input" type="number" min="0" id="disc-val-${p.id}"
                value="${p.discount ? p.discount.value : ''}" placeholder="0" style="width:60px;">
              <button class="stock-save-btn" onclick="saveDiscount(${p.id})">Akció</button>
              ${p.discount ? `<button class="stock-save-btn" onclick="removeDiscount(${p.id})" style="border-color:rgba(207,102,121,0.5);color:#CF6679;">✕</button>` : ''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

async function saveStock(productId) {
  const input = document.getElementById(`stock-val-${productId}`);
  const newStock = parseInt(input.value);
  if (isNaN(newStock) || newStock < 0) { alert('Érvénytelen érték'); return; }
  try {
    const res = await fetch(`${API}/admin/products/${productId}/stock`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify({ stock: newStock })
    });
    if (!res.ok) throw new Error();
    const p = allProducts.find(x => x.id === productId);
    if (p) p.stock = newStock;
    document.getElementById(`stock-cell-${productId}`).innerHTML = stockBadge(newStock);
    input.style.borderColor = '#4CAF50';
    setTimeout(() => input.style.borderColor = '', 1500);
  } catch(e) {
    alert('Mentési hiba – ellenőrizd a kapcsolatot.');
  }
}

async function saveDiscount(productId) {
  const type  = document.getElementById(`disc-type-${productId}`).value;
  const value = parseFloat(document.getElementById(`disc-val-${productId}`).value);
  if (isNaN(value) || value <= 0) { alert('Add meg a kedvezmény értékét!'); return; }
  if (type === 'percent' && value > 100) { alert('A százalék nem lehet több 100-nál!'); return; }
  const p = allProducts.find(x => x.id === productId);
  if (type === 'fixed' && p && value >= p.price) { alert('A fix kedvezmény nem lehet nagyobb az árnál!'); return; }
  try {
    const res = await fetch(`${API}/admin/products/${productId}/discount`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify({ discount: { type, value } })
    });
    if (!res.ok) throw new Error();
    if (p) p.discount = { type, value };
    const discPrice = calcDiscounted(p.price, p.discount);
    document.getElementById(`disc-cell-${productId}`).innerHTML = discountDisplay(p.discount);
    document.getElementById(`disc-price-cell-${productId}`).innerHTML =
      discPrice !== null ? `<span style="color:#CF6679;">${discPrice.toLocaleString('hu-HU')} Ft</span>` : '—';
    // Refresh row to show ✕ button
    renderStock();
  } catch(e) {
    alert('Mentési hiba – ellenőrizd a kapcsolatot.');
  }
}

async function removeDiscount(productId) {
  try {
    const res = await fetch(`${API}/admin/products/${productId}/discount`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify({ discount: null })
    });
    if (!res.ok) throw new Error();
    const p = allProducts.find(x => x.id === productId);
    if (p) p.discount = null;
    renderStock();
  } catch(e) {
    alert('Mentési hiba – ellenőrizd a kapcsolatot.');
  }
}

// Auto-login from session
window.addEventListener('DOMContentLoaded', async () => {
  const savedKey = sessionStorage.getItem('olivalia_admin');
  if (savedKey) {
    document.getElementById('adminKey').value = savedKey;
    await login();
  }
});
</script>

<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLIVALIA — A new world of olive oil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #B8986A;
      --gold-light: #D4B483;
      --gold-dark: #8A6D42;
      --black: #0A0A0A;
      --white: #F5F0E8;
      --gray: #1A1A1A;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    .landing {
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: radial-gradient(ellipse at 50% 60%, #1a1208 0%, #0A0A0A 70%);
    }

    /* Animated grain overlay */
    .landing::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.4;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeUp 1.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      margin-bottom: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-img {
      width: 320px;
      margin-bottom: 8px;
    }

    /* Kill all browser default link colours */
    a, a:link, a:visited, a:hover, a:active {
      color: inherit;
      text-decoration: none;
    }

    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.8;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 36px auto;
    }

    .lang-prompt {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 3px;
      color: rgba(245,240,232,0.4);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .lang-buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    .lang-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 0;
      width: 180px;
      border: 1px solid rgba(184,152,106,0.3);
      background: transparent;
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .lang-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(184,152,106,0.08), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .lang-btn:hover::before { opacity: 1; }

    .lang-btn:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(184,152,106,0.15);
    }

    .lang-flag {
      width: 36px;
      height: 26px;
      display: block;
    }

    .lang-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: 2px;
    }

    .lang-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 400;
    }

    /* Decorative corner lines */
    .corner {
      position: fixed;
      width: 60px; height: 60px;
      opacity: 0.3;
    }
    .corner-tl { top: 32px; left: 32px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-tr { top: 32px; right: 32px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner-bl { bottom: 32px; left: 32px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-br { bottom: 32px; right: 32px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    @media (max-width: 600px) {
      .lang-buttons { flex-direction: column; gap: 16px; align-items: center; }
      .lang-btn { padding: 22px 0; width: 220px; }
    }
  </style>
</head>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
